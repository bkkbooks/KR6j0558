body:
  text: 東晉竺曇無蘭譯南無佛南無法南無比丘僧南無舍利弗大目乾連比丘南無覺意名聞邊北方健陀摩呵衍山彼有虫王名差吼無在某牙齒中止今當遣使者無敢食某牙及牙根中牙根中牙邊虫不即下器中頭破作七分如鳩羅勤蟮梵天勸是呪南無佛令我所呪皆從如願
